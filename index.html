// ── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [data, setData] = useState(EMPTY);
  const [tab, setTab] = useState('dashboard');
  const [modal, setModal] = useState(null);
  const [playFilter, setPlayFilter] = useState('all');
  const [activeCampaign, setActiveCampaign] = useState(null);

  useEffect(()=>{ const saved=loadData(); if(saved) setData(saved); },[]);
  const update = useCallback(next=>{ setData(next); saveData(next); },[]);
  const { games, plays, campaigns } = data;

  const addGame = g => update({...data,games:[...games,g]});
  const addPlay = p => {
    let updatedCampaigns = campaigns;
    // If linked to a campaign and has a scenario name, add/update that scenario's score
    if (p.campaignId && p.scenario) {
      updatedCampaigns = campaigns.map(c => {
        if (c.id !== p.campaignId) return c;
        const existing = (c.scenarios||[]).findIndex(s => s.name === p.scenario);
        const scEntry = {
          id: existing >= 0 ? c.scenarios[existing].id : uid(),
          name: p.scenario,
          result: p.result === 'win' || p.result === 'cooperative-win' ? 'win' : p.result === 'loss' || p.result === 'cooperative-loss' ? 'loss' : '',
          date: p.date,
          notes: p.notes || '',
          completed: p.result === 'win' || p.result === 'cooperative-win' || p.result === 'loss' || p.result === 'cooperative-loss',
          scores: p.scores || null,
          scoreColumns: p.scoreColumns || null,
          playId: p.id,
        };
        const newScenarios = existing >= 0
          ? c.scenarios.map((s,i) => i === existing ? scEntry : s)
          : [...(c.scenarios||[]), scEntry];
        return {...c, scenarios: newScenarios};
      });
    }
    update({...data, plays:[...plays,p], campaigns: updatedCampaigns});
  };
  const addCampaign = c => update({...data,campaigns:[...campaigns,c]});
  const deletePlay = id => update({...data,plays:plays.filter(p=>p.id!==id)});
  const deleteGame = id => update({...data,games:games.filter(g=>g.id!==id)});
  const deleteCampaign = id => update({...data,campaigns:campaigns.filter(c=>c.id!==id)});
  const updateCampaign = c => update({...data,campaigns:campaigns.map(x=>x.id===c.id?c:x)});

  const TABS = ['dashboard','plays','campaigns','games','stats'];
  const LABELS = {dashboard:'Dashboard',plays:'Play Log',campaigns:'Campaigns',games:'Library',stats:'Statistics'};

  const wins = plays.filter(p=>p.result==='win'||p.result==='cooperative-win').length;
  const totalMins = plays.reduce((s,p)=>s+(parseInt(p.duration)||0),0);
  const recentPlays = [...plays].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);
  const filteredPlays = playFilter==='all'?plays:plays.filter(p=>games.find(g=>g.id===p.gameId)?.name===playFilter);

  if(activeCampaign) {
    const c = campaigns.find(x=>x.id===activeCampaign);
    if(c) return (
      <div>
        <div className="site-header">
          <div className="site-title"><span className="rune">⬡</span> Chronicle</div>
          <div className="site-subtitle">Boardgame Tracker</div>
        </div>
        <CampaignDetail campaign={c} games={games} onUpdate={updateCampaign} onBack={()=>setActiveCampaign(null)}/>
      </div>
    );
  }

  return (
    <div>
      <div className="site-header">
        <div className="site-title"><span className="rune">⬡</span> Chronicle</div>
        <div className="site-subtitle">Boardgame Tracker</div>
      </div>

      <div className="tabs">
        {TABS.map(t=>(
          <button key={t} className={`tab-btn ${tab===t?'active':''}`} onClick={()=>setTab(t)}>{LABELS[t]}</button>
        ))}
      </div>

      {tab==='dashboard'&&<div className="fade-in">
        <div className="stat-grid">
          <div className="stat-card"><div className="stat-label">Total Plays</div><div className="stat-value">{plays.length}</div></div>
          <div className="stat-card"><div className="stat-label">Hours Played</div><div className="stat-value">{(totalMins/60).toFixed(1)}</div></div>
          <div className="stat-card"><div className="stat-label">Win Rate</div><div className="stat-value">{plays.length?Math.round(wins/plays.length*100)+'%':'—'}</div></div>
          <div className="stat-card"><div className="stat-label">Active Quests</div><div className="stat-value">{campaigns.filter(c=>c.status==='active').length}</div></div>
        </div>
        <div className="section-header">
          <span className="section-label" style={{marginBottom:0}}>Recent Plays</span>
          <Btn variant="primary" onClick={()=>setModal('play')}>+ Record Play</Btn>
        </div>
        <div style={{marginTop:'0.875rem'}}>
          {recentPlays.length?recentPlays.map(p=><PlayCard key={p.id} play={p} games={games} campaigns={campaigns}/>):<div className="empty"><span className="empty-rune">◈</span>No plays recorded yet — begin your chronicle</div>}
        </div>
      </div>}

      {tab==='plays'&&<div className="fade-in">
        <div className="section-header">
          <div className="section-title">Play Log</div>
          <Btn variant="primary" onClick={()=>setModal('play')}>+ Record Play</Btn>
        </div>
        <div className="filter-row">
          {['all',...new Set(plays.map(p=>games.find(g=>g.id===p.gameId)?.name).filter(Boolean))].map(f=>(
            <button key={f} className={`filter-pill ${playFilter===f?'active':''}`} onClick={()=>setPlayFilter(f)}>{f==='all'?'All Games':f}</button>
          ))}
        </div>
        {[...filteredPlays].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(p=><PlayCard key={p.id} play={p} games={games} campaigns={campaigns} onDelete={()=>deletePlay(p.id)}/>)}
        {!filteredPlays.length&&<div className="empty"><span className="empty-rune">◈</span>No plays logged yet</div>}
      </div>}

      {tab==='campaigns'&&<div className="fade-in">
        <div className="section-header">
          <div className="section-title">Campaigns</div>
          <Btn variant="primary" onClick={()=>setModal('campaign')}>+ New Campaign</Btn>
        </div>
        {!campaigns.length&&<div className="empty"><span className="empty-rune">◈</span>No campaigns yet — begin your epic</div>}
        {campaigns.map(c=>{
          const g=games.find(x=>x.id===c.gameId)||{name:'Unknown'};
          const done=c.scenarios?.filter(s=>s.completed).length||0;
          const total=c.scenarios?.length||0;
          const pct=total?Math.round(done/total*100):0;
          const mods=c.modules||[];
          return (
            <div key={c.id} className="card card-campaign" style={{cursor:'pointer'}} onClick={()=>setActiveCampaign(c.id)}>
              <div className="flex items-start justify-between gap-2">
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2 flex-wrap">
                    <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'1.15rem',fontWeight:400,color:'var(--text)'}}>{c.name}</span>
                    <Badge color={c.status==='active'?'gold':c.status==='completed'?'green':'gray'}>{c.status}</Badge>
                  </div>
                  <div style={{fontSize:10,color:'var(--text-faint)',marginTop:3,letterSpacing:'0.08em'}}>{g.name}{c.players?' · '+c.players:''}</div>
                  {total>0&&<div className="flex items-center gap-2 mt-2" style={{maxWidth:200}}>
                    <div className="progress-track"><div className="progress-fill" style={{width:pct+'%'}}/></div>
                    <span style={{fontSize:9,color:'var(--text-faint)',letterSpacing:'0.1em'}}>{done}/{total}</span>
                  </div>}
                  {mods.length>0&&<div style={{fontSize:9,marginTop:6,letterSpacing:'0.08em'}}>
                    <span style={{color:'var(--text-faint)'}}>{mods.length} module{mods.length!==1?'s':''}: </span>
                    <span style={{color:'var(--gold-dim)'}}>{mods.map(m=>m.label).join(', ')}</span>
                  </div>}
                </div>
                <div className="flex gap-2 flex-shrink-0" onClick={e=>e.stopPropagation()}>
                  <Btn size="sm" onClick={()=>setActiveCampaign(c.id)}>Open</Btn>
                  <Btn size="sm" variant="danger" onClick={()=>deleteCampaign(c.id)}>Remove</Btn>
                </div>
              </div>
            </div>
          );
        })}
      </div>}

      {tab==='games'&&<div className="fade-in">
        <div className="section-header">
          <div className="section-title">Library</div>
          <Btn variant="primary" onClick={()=>setModal('game')}>+ Add Game</Btn>
        </div>
        {!games.length&&<div className="empty"><span className="empty-rune">◈</span>Your library awaits</div>}
        {games.map(g=>{
          const gp=plays.filter(p=>p.gameId===g.id);
          const gw=gp.filter(p=>p.result==='win'||p.result==='cooperative-win').length;
          const gMins=gp.reduce((s,p)=>s+(parseInt(p.duration)||0),0);
          return (
            <div key={g.id} className="card">
              <div className="flex items-start justify-between gap-2">
                <div>
                  <div className="flex items-center gap-2 flex-wrap">
                    <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'1.1rem',fontWeight:400,color:'var(--text)'}}>{g.name}</span>
                    {g.type==='campaign'&&<Badge color="purple">Campaign</Badge>}
                    {g.type==='cooperative'&&<Badge color="blue">Coop</Badge>}
                  </div>
                  <div style={{fontSize:10,color:'var(--text-faint)',marginTop:3,letterSpacing:'0.08em'}}>
                    {gp.length} play{gp.length!==1?'s':''}
                    {gp.length?` · ${Math.round(gw/gp.length*100)}% win rate`:''}
                    {gMins?` · ${(gMins/60).toFixed(1)}h`:''}
                    {g.minPlayers?` · ${g.minPlayers}${g.maxPlayers&&g.maxPlayers!==g.minPlayers?'–'+g.maxPlayers:''}p`:''}
                    {g.duration?` · ~${g.duration}min`:''}
                  </div>
                  {g.notes&&<div style={{fontSize:11,color:'var(--text-faint)',marginTop:4,fontStyle:'italic'}}>{g.notes}</div>}
                </div>
                <Btn size="sm" variant="danger" onClick={()=>deleteGame(g.id)}>Remove</Btn>
              </div>
            </div>
          );
        })}
      </div>}

      {tab==='stats'&&<Statistics plays={plays} games={games} campaigns={campaigns}/>}

      {modal==='play'&&<LogPlayModal games={games} campaigns={campaigns} onSave={addPlay} onClose={()=>setModal(null)}/>}
      {modal==='game'&&<AddGameModal onSave={addGame} onClose={()=>setModal(null)}/>}
      {modal==='campaign'&&<AddCampaignModal games={games} onSave={addCampaign} onClose={()=>setModal(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
